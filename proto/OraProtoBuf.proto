syntax = "proto3";
package OpenLogReplicator.pb;

option go_package = "github.com/null-ptr-exception/dblog-cdc/pb";

enum Op {
    BEGIN  = 0;
    COMMIT = 1;
    INSERT = 2;
    UPDATE = 3;
    DELETE = 4;
    DDL = 5;
    CHKPT = 6;
}

enum ColumnType {
    UNKNOWN = 0;
    VARCHAR2 = 1;
    NUMBER = 2;
    LONG = 3;
    DATE = 4;
    RAW = 5;
    LONG_RAW = 6;
    CHAR = 7;
    BINARY_FLOAT = 8;
    BINARY_DOUBLE = 9;
    CLOB = 10;
    BLOB = 11;
    TIMESTAMP = 12;
    TIMESTAMP_WITH_TZ = 13;
    INTERVAL_YEAR_TO_MONTH = 14;
    INTERVAL_DAY_TO_SECOND = 15;
    UROWID = 16;
    TIMESTAMP_WITH_LOCAL_TZ = 17;
}

enum RequestCode {
    INFO = 0;
    START = 1;
    CONTINUE = 2;
    CONFIRM = 3;
}

enum ResponseCode {
    READY = 0;
    FAILED_START = 1;
    STARTING = 2;
    ALREADY_STARTED = 3;
    REPLICATE = 4;
    PAYLOAD = 5;
    INVALID_DATABASE = 6;
    INVALID_COMMAND = 7;
}

message Value {
    string name = 1;
    oneof datum {
        int64 value_int = 2;
        float value_float = 3;
        double value_double = 4;
        string value_string = 5;
        bytes value_bytes = 6;
    }
}

message Column {
    string name = 1;
    ColumnType type = 2;
    int32 length = 3;
    int32 precision = 4;
    int32 scale = 5;
    bool nullable = 6;
}

message Schema {
    string owner = 1;
    string name = 2;
    uint32 obj = 3;
    oneof tm_val {
        uint64 tm = 4;
        string tms = 5;
    }
    repeated Column column = 6;
}

message Payload {
    Op op = 1;
    Schema schema = 2;
    string rid = 3;
    repeated Value before = 4;
    repeated Value after = 5;
    string ddl = 6;
    uint32 seq = 7;
    uint64 offset = 8;
    bool redo = 9;
    uint64 num = 10;
}

message SchemaRequest {
    string mask = 1;
    string filter = 2;
}

message RedoRequest {
    RequestCode code = 1;
    string database_name = 2;
    oneof tm_val {
        uint64 scn = 3;
        string tms = 4;
        int64 tm_rel = 5;
    }
    optional uint64 seq = 6;
    repeated SchemaRequest schema = 7;
    optional uint64 c_scn = 8;
    optional uint64 c_idx = 9;
}

message RedoResponse {
    ResponseCode code = 1;
    oneof scn_val {
        uint64 scn = 2;
        string scns = 3;
    }
    oneof tm_val {
        uint64 tm = 4;
        string tms = 5;
    }
    oneof xid_val {
        string xid = 6;
        uint64 xidn = 7;
    }
    string db = 8;
    repeated Payload payload = 9;
    uint64 c_scn = 10;
    uint64 c_idx = 11;
    map<string,string> attributes = 12;
}
