services:
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: dblog-oracle
    ports:
      - "11521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: testuser
      APP_USER_PASSWORD: testuser
    volumes:
      - ./testenv/oracle-init:/container-entrypoint-initdb.d
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30

  olr:
    image: ghcr.io/rophy/openlogreplicator:v1.9.0.1
    container_name: dblog-olr
    user: "1000:1000"
    entrypoint: ["/bin/bash", "-c", "mkdir -p /olr-data/checkpoint && exec /opt/OpenLogReplicator/OpenLogReplicator \"$@\"", "--"]
    command: ["-r", "-f", "/config/olr-config.json"]
    working_dir: /olr-data
    ports:
      - "15000:5000"
    group_add:
      - "54321"
    depends_on:
      oracle:
        condition: service_healthy
    tmpfs:
      - /olr-data:uid=1000,gid=54322
    volumes:
      - ./testenv/olr-config.json:/config/olr-config.json:ro
      - oracle-data:/opt/oracle/oradata:ro

  yugabytedb:
    image: yugabytedb/yugabyte:2025.2.4.0-b122
    container_name: dblog-yugabytedb
    command: >
      bin/yugabyted start
      --daemon=false
      --tserver_flags="ysql_num_shards_per_tserver=1"
    ports:
      - "15433:5433"
      - "25433:15433"
    healthcheck:
      test: ["CMD", "bin/yugabyted", "status"]
      interval: 10s
      timeout: 5s
      retries: 30

  dev:
    build:
      context: .
      dockerfile: testenv/Dockerfile.test
    container_name: dblog-dev
    environment:
      ORACLE_DSN: "oracle://testuser:testuser@oracle:1521/FREEPDB1"
      YB_DSN: "postgres://yugabyte:yugabyte@yugabytedb:5433/yugabyte"
      OLR_HOST: olr
      OLR_PORT: "5000"
    depends_on:
      oracle:
        condition: service_healthy
    profiles:
      - test
    command: ["go", "test", "-tags", "integration", "-v", "-timeout", "180s", "./integration/"]

volumes:
  oracle-data:
